name: build-check

on:
  pull_request:
    paths:
      - "styles/**"
      - "scripts/**"
      - "package.json"
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify built .user.css files are in sync
        run: npm run build:check
