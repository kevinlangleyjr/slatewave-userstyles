name: Bug — something looks unthemed or broken
description: Report a surface that's still showing GitHub-default colors, or a Slatewave style that broke after a site update.
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: site
    attributes:
      label: Which style?
      options:
        - GitHub
        - Other (specify in description)
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where on the site?
      description: URL or path, plus what surface (button / card / dropdown / etc).
      placeholder: |
        URL: https://github.com/owner/repo/issues
        Surface: the labels in the sidebar
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: A picture is worth a thousand selectors. Before/after if possible.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + Stylus version
      placeholder: Firefox 132 / Stylus 2.2.4
    validations:
      required: false
